<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse | Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
          <h1>Pulse</h1>
          <p>Sign in to your dashboard</p>
          <input type="text" id="username" placeholder="Username">
          <input type="password" id="password" placeholder="Password">
          <button id="loginBtn">Log In</button>
          <p class="login-hint">Hint: try admin / admin</p>
        </div>
      </div>
      <div class="dashboard" id="dashboard" style="display: none;">

        <aside class="sidebar">
          <h2 class="sidebar-logo">Pulse</h2>
          <nav class="sidebar-nav">
            <a href="#">Dashboard</a>
            <a href="#">Analytics</a>
            <a href="#">Users</a>
            <a href="#">Settings</a>
          </nav>
        </aside>
      
        <div class="main-content">
          <header class="topbar">
            <h1>Dashboard</h1>
            <button id="themeToggle">🌙 Dark Mode</button>
          </header>
      
          <div class="stats-grid">
            <div class="stat-card">
              <p class="stat-label">Total Users</p>
              <h2 class="stat-value">12,483</h2>
            </div>
            <div class="stat-card">
              <p class="stat-label">Revenue</p>
              <h2 class="stat-value">$48,210</h2>
            </div>
            <div class="stat-card">
              <p class="stat-label">Active Sessions</p>
              <h2 class="stat-value">1,029</h2>
            </div>
            <div class="stat-card">
              <p class="stat-label">Churn Rate</p>
              <h2 class="stat-value">3.2%</h2>
            </div>
            <div class="chart-container">
                <h2 class="chart-title">Monthly Revenue</h2>
                <canvas id="revenueChart"></canvas>
              </div>
              
          </div>
        </div>
      
      </div>
      
      
    
      <div class="toast" id="toast">Welcome back, Admin!</div>

      <script src="script.js"></script>
    
</body>
</html>
